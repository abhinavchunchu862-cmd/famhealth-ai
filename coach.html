<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coach - FamHealth AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-bottom: 20px;
        }
        .chat-msg {
            max-width: 85%;
            padding: 0.875rem 1.25rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .msg-ai {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }
        .msg-user {
            background: var(--accent-color);
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
        }
        .chat-input-wrapper {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }
        .chat-input {
            flex-grow: 1;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 0.875rem 1.25rem;
            color: white;
            outline: none;
        }
        .chat-input:focus {
            border-color: var(--accent-color);
        }
        .send-btn {
            background: var(--accent-color);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0;
            min-height: auto;
        }
        .lang-toggle {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body class="dashboard-body" style="height: 100vh; overflow: hidden;">
    <div class="background-animation"></div>
    <div class="container dashboard-container" style="padding-bottom: 80px; height: 100%;">
        
        <!-- Header -->
        <header class="dash-header glass" style="margin-bottom: 1rem; padding: 1rem 1.5rem;">
            <div style="display: flex; align-items: center; gap: 1rem; width: 100%;">
                <div class="icon" style="font-size: 2rem;">🤖</div>
                <div style="flex-grow: 1;">
                    <h1 class="mb-0" style="font-size: 1.25rem;">Health Coach</h1>
                    <p class="subtitle mb-0" id="coachStatus">Online</p>
                </div>
                <!-- Telugu Toggle -->
                <button class="lang-toggle" id="langToggle">తెలుగు</button>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-container" id="chatContainer">
            <div class="chat-msg msg-ai" id="welcomeMsg">
                Hi there! I'm your FamHealth AI coach. I can help you with diet planning, healthy habits, or general wellness advice. How can I support you today?
            </div>
        </main>

        <!-- Input Area -->
        <form class="chat-input-wrapper" id="chatForm">
            <input type="text" class="chat-input" id="chatInput" placeholder="Ask me anything..." required>
            <button type="submit" class="send-btn">➤</button>
        </form>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass">
            <a href="index.html" class="nav-item">
                <span class="icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="diet.html" class="nav-item">
                <span class="icon">📊</span>
                <span>Track</span>
            </a>
            <a href="coach.html" class="nav-item active" style="color: var(--accent-color);">
                <span class="icon">🤖</span>
                <span>Coach</span>
            </a>
        </nav>
    </div>

    <script src="coach.js"></script>
</body>
</html>
