<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - FamHealth AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    <div class="background-animation"></div>
    <div class="container dashboard-container" style="padding-bottom: 80px;">
        
        <header class="dash-header glass" style="margin-bottom: 1rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="index.html" class="back-btn">←</a>
                <div>
                    <h1 class="mb-0">Analytics</h1>
                    <p class="subtitle mb-0">Your Progress Trends</p>
                </div>
            </div>
        </header>

        <main class="dash-main">
            <!-- Overall Diet Score -->
            <section class="glass card-section text-center" style="display: flex; flex-direction: column; align-items: center;">
                <h2>Today's Diet Score</h2>
                <div class="score-circle mt-2" id="scoreCircle">
                    <span class="score-value" id="scoreValue">--</span>
                </div>
                <p class="subtitle mt-2" id="scoreTagline" style="margin-bottom: 0;">Calculating score...</p>
            </section>

            <!-- Progress Insights -->
            <section class="glass card-section ai-insight mt-2">
                <div class="insight-header">
                    <span class="icon">💡</span>
                    <h2>Progress Insights</h2>
                </div>
                <ul id="insightsList" style="margin: 0; padding-left: 1.5rem; font-size: 0.85rem; color: #f1f5f9; line-height: 1.6;">
                    <li>Analyzing your data...</li>
                </ul>
            </section>

            <!-- Weekly Calorie Trends -->
            <section class="glass card-section mt-2">
                <h2 style="margin-bottom: 0.5rem;">Calorie Intake Trend</h2>
                <p class="subtitle" style="font-size: 0.75rem;">Last 7 days (kcal)</p>
                <div class="chart-container" id="calorieChart">
                    <!-- Javascript populates bars -->
                </div>
            </section>

            <!-- Protein Trends -->
            <section class="glass card-section mt-2">
                <h2 style="margin-bottom: 0.5rem;">Protein Intake Trend</h2>
                <p class="subtitle" style="font-size: 0.75rem;">Last 7 days (grams)</p>
                <div class="chart-container" id="proteinChart">
                    <!-- Javascript populates bars -->
                </div>
            </section>

        </main>
    </div>

    <script src="analytics.js"></script>
</body>
</html>
